<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>IoT Energy Dashboard v3</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{--bg:#080d1a;--card:#111827;--txt:#e2e8f4;--muted:#8892a8;--border:#2a3441;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;}
:root[data-theme="light"]{--bg:#f3f4f6;--card:#ffffff;--txt:#111827;--muted:#4b5563;--border:#e5e7eb;--blue:#2563eb;--green:#059669;--red:#dc2626;--amber:#d97706;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--txt);transition:all .3s ease;}
.nav{display:flex;justify-content:space-between;padding:15px 30px;background:var(--card);border-bottom:1px solid var(--border);}
.nav-brand{font-size:1.2rem;font-weight:700;}
.nav-controls{display:flex;gap:15px;align-items:center;}
select,button,input{background:var(--bg);color:var(--txt);border:1px solid var(--border);padding:5px 10px;border-radius:5px;}
button{cursor:pointer;background:var(--blue);color:white;border:none;font-weight:600;}
button:hover{opacity:.8;}
.btn-red{background:var(--red);}.btn-green{background:var(--green);}.btn-outline{background:transparent;border:1px solid var(--blue);color:var(--blue);}
.container{padding:20px 30px;display:grid;grid-template-columns:3fr 1fr;gap:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;}
.metric{text-align:center;}
.metric-val{font-size:2rem;font-weight:700;}
.metric-lbl{font-size:.8rem;color:var(--muted);text-transform:uppercase;}
.chart-container{position:relative;height:300px;width:100%;}
.status{display:inline-block;padding:3px 8px;border-radius:12px;font-size:.8rem;font-weight:bold;}
.s-on{background:var(--green);color:white;}.s-off{background:var(--red);color:white;}
.dev-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
#alert-banner{display:none;background:var(--red);color:white;text-align:center;padding:10px;font-weight:bold;}
</style>
</head>
<body>
<div id="alert-banner">HIGH POWER WARNING</div>
<div class="nav">
  <div class="nav-brand">⚡ Energy Dashboard v3</div>
  <div class="nav-controls">
    <select id="room-select" onchange="loadRoom()"></select>
    <button onclick="toggleTheme()">🌓 Theme</button>
    <span id="user-info"></span>
    <button onclick="logout()" class="btn-red">Logout</button>
  </div>
</div>
<div class="container">
  <div class="main-content">
    <div class="card grid-4">
      <div class="metric"><div class="metric-val" id="val-temp">--</div><div class="metric-lbl">Temp (°C)</div></div>
      <div class="metric"><div class="metric-val" id="val-lux">--</div><div class="metric-lbl">Lux</div></div>
      <div class="metric"><div class="metric-val" id="val-occ">--</div><div class="metric-lbl">Occupied</div></div>
      <div class="metric"><div class="metric-val" id="val-pwr">--</div><div class="metric-lbl">Power (W)</div></div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;">
        <h3>Power Trend</h3>
        <a href="/api/export/csv" id="export-btn" class="btn-outline" style="padding:5px 10px;text-decoration:none;border-radius:5px;">Download CSV</a>
      </div>
      <div class="chart-container"><canvas id="powerChart"></canvas></div>
    </div>
    <div class="card grid-4">
      <div class="metric"><div class="metric-val" id="pred-trend">--</div><div class="metric-lbl">ML Trend</div></div>
      <div class="metric"><div class="metric-val" id="weather-temp">--</div><div class="metric-lbl">Outside Temp</div></div>
      <div class="metric"><div class="metric-val" id="weekly-diff">--</div><div class="metric-lbl">Week vs Week</div></div>
      <div class="metric"><div class="metric-val" id="cost-hr">--</div><div class="metric-lbl">Est. Cost/Hr</div></div>
    </div>
  </div>
  <div class="side-content">
    <div class="card">
      <h3>Device Status</h3>
      <div class="dev-row"><span>Light</span><span id="st-light" class="status s-off">OFF</span></div>
      <div class="dev-row admin-only" style="display:none;">
        <button onclick="override('light',true)" class="btn-green">ON</button>
        <button onclick="override('light',false)" class="btn-red">OFF</button>
        <button onclick="override('light',null)">AUTO</button>
      </div>
      <hr style="margin:15px 0;border-color:var(--border);">
      <div class="dev-row"><span>HVAC</span><span id="st-hvac" class="status s-off">OFF</span></div>
      <div class="dev-row admin-only" style="display:none;">
        <button onclick="override('hvac',true)" class="btn-green">ON</button>
        <button onclick="override('hvac',false)" class="btn-red">OFF</button>
        <button onclick="override('hvac',null)">AUTO</button>
      </div>
    </div>
    <div class="card admin-only" style="display:none;">
      <h3>Settings</h3>
      <div style="margin-top:10px;">
        <label>Alert Threshold (W)</label>
        <input type="number" id="inp-thr" style="width:100%;margin:5px 0;">
        <button onclick="setThreshold()" style="width:100%;">Apply</button>
      </div>
      <div style="margin-top:15px;">
        <label>Energy Rate ($/kWh)</label>
        <input type="number" id="inp-rate" step="0.01" style="width:100%;margin:5px 0;">
        <button onclick="setRate()" style="width:100%;">Apply</button>
      </div>
    </div>
    <div class="card">
      <h3>Weather Info</h3>
      <p id="weather-desc" style="margin:10px 0;color:var(--muted);">Loading...</p>
      <p><b>Suggestion:</b> <span id="weather-sugg">--</span></p>
    </div>
  </div>
</div>
<script>
let role = 'viewer';
let currentRoom = 1;
let energyRate = 0.12;

// Init Chart
const ctx = document.getElementById('powerChart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: { labels: [], datasets: [
    { label: 'Real Power', data: [], borderColor: '#3b82f6', tension: 0.3 },
    { label: 'ML Prediction', data: [], borderColor: '#f59e0b', borderDash: [5, 5], tension: 0.3, fill: false }
  ]},
  options: { responsive: true, maintainAspectRatio: false, animation: false,
             scales: { y: { suggestedMin: 0, suggestedMax: 800 } } }
});

// Socket
const socket = io();
socket.on('new_reading', (data) => {
  if (data.room_id == currentRoom) updateMetrics(data);
});

// Theme
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
}

// Fetch Initial Data
async function init() {
  const meRes = await fetch('/api/me');
  if (!meRes.ok) return window.location.href='/login';
  const me = await meRes.json();
  role = me.role;
  document.getElementById('user-info').textContent = `${me.username} (${role})`;
  if (role === 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');

  const rRes = await fetch('/api/rooms');
  const rooms = await rRes.json();
  const sel = document.getElementById('room-select');
  sel.innerHTML = rooms.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
  
  loadRoom();
  setInterval(fetchSlowData, 10000);
}

async function loadRoom() {
  currentRoom = document.getElementById('room-select').value;
  document.getElementById('export-btn').href = '/api/export/csv?room_id=' + currentRoom;
  
  const res = await fetch('/api/latest?room_id=' + currentRoom);
  const data = await res.json();
  if (data.latest) updateMetrics(data.latest);
  if (data.threshold) document.getElementById('inp-thr').value = data.threshold;
  if (data.energy_rate) {
    energyRate = data.energy_rate;
    document.getElementById('inp-rate').value = data.energy_rate;
  }
  
  const labels = data.rows.map(r => r.timestamp.split('T')[1].substring(0,8));
  const pwr = data.rows.map(r => r.power);
  chart.data.labels = labels;
  chart.data.datasets[0].data = pwr;
  chart.update();
  
  fetchSlowData();
}

function updateMetrics(r) {
  document.getElementById('val-temp').textContent = r.temp.toFixed(1);
  document.getElementById('val-lux').textContent = r.lux.toFixed(0);
  document.getElementById('val-occ').textContent = r.occupancy ? 'YES' : 'NO';
  document.getElementById('val-pwr').textContent = r.power.toFixed(1);
  
  const ls = document.getElementById('st-light');
  ls.textContent = r.light_status ? 'ON' : 'OFF';
  ls.className = r.light_status ? 'status s-on' : 'status s-off';
  
  const hs = document.getElementById('st-hvac');
  hs.textContent = r.hvac_status ? 'ON' : 'OFF';
  hs.className = r.hvac_status ? 'status s-on' : 'status s-off';
  
  document.getElementById('alert-banner').style.display = r.alert ? 'block' : 'none';
  
  document.getElementById('cost-hr').textContent = '$' + ((r.power/1000) * energyRate).toFixed(3);
  
  // Real-time chart update if not full
  if(chart.data.labels.length > 0) {
    let t = r.timestamp.split('T')[1].substring(0,8);
    if(chart.data.labels[chart.data.labels.length-1] !== t){
      chart.data.labels.push(t);
      chart.data.datasets[0].data.push(r.power);
      if(chart.data.labels.length > 30){
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
      }
      chart.update();
    }
  }
}

async function fetchSlowData() {
  // Weather
  fetch('/api/weather').then(r=>r.json()).then(w => {
    document.getElementById('weather-temp').textContent = w.temp.toFixed(1) + '°C';
    document.getElementById('weather-desc').textContent = `${w.city}: ${w.desc}`;
    document.getElementById('weather-sugg').textContent = w.suggestion;
  });
  // Prediction
  fetch('/api/predict?room_id='+currentRoom).then(r=>r.json()).then(p => {
    document.getElementById('pred-trend').textContent = p.trend ? p.trend.toUpperCase() : '--';
    chart.data.datasets[1].data = new Array(30).fill(null);
    if(p.predicted && p.predicted.length) {
      // pad prediction
      let offset = chart.data.datasets[0].data.length - 1;
      for(let i=0; i<p.predicted.length && (offset+i) < 30; i++) {
        chart.data.datasets[1].data[offset+i] = p.predicted[i];
      }
    }
    chart.update();
  });
  // Weekly
  fetch('/api/reports/weekly?room_id='+currentRoom).then(r=>r.json()).then(w => {
    let diff = w.pct_change;
    let el = document.getElementById('weekly-diff');
    el.textContent = (diff > 0 ? '+' : '') + diff + '%';
    el.style.color = diff > 0 ? 'var(--red)' : 'var(--green)';
  });
}

function override(dev, state) {
  fetch('/api/override', {
    method:'POST', body:JSON.stringify({device:dev, state:state, room_id:currentRoom})
  });
}
function setThreshold() {
  fetch('/api/threshold', {
    method:'POST', body:JSON.stringify({threshold:document.getElementById('inp-thr').value})
  });
}
function setRate() {
  fetch('/api/energy_rate', {
    method:'POST', body:JSON.stringify({rate:document.getElementById('inp-rate').value})
  }).then(() => loadRoom());
}
function logout() { window.location.href='/api/logout'; }

init();
</script>
</body>
</html>
